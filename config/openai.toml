# Secret-free OpenAI profile for Bandicot.
#
# Do not add an API key here. The Bandicot launcher supplies a short-lived
# provider URL and token for either OpenAI Platform or local CLIProxyAPI.

[cli]
# The upstream updater downloads xAI release artifacts. This fork is updated by
# scripts/update-from-upstream.sh instead.
auto_update = false

[models]
default = "openai-latest"
default_reasoning_effort = "medium"

# Pin every auxiliary model slot so no compiled xAI model default is selected.
web_search = "openai-luna"
session_summary = "openai-luna"
image_description = "openai-luna"
prompt_suggestion = "openai-luna"

# Keep the picker inside Bandicot's provider catalog. OpenAI remains the default;
# other providers fail closed if their key or local runtime is unavailable.
allowed_models = ["openai-*", "go-*", "ollama-*", "apple-*"]

[features]
# Do not contact xAI service surfaces from the OpenAI distribution.
telemetry = false
feedback = false
managed_config = false
remote_fetch = false
video_gen = false
voice_mode = false

# Hosted search remains off until the OpenAI web-search wire shape has its own
# provider-isolation acceptance test. Local tools and MCP servers are unchanged.
backend_tools = false

[telemetry]
trace_upload = false
mixpanel_enabled = false
otel_enabled = false

[diagnostics]
error_reporting = false

[model.openai-latest]
model = "gpt-5.6"
base_url = "${BANDICOT_OPENAI_BASE_URL}"
name = "OpenAI GPT-5.6 (latest alias)"
description = "OpenAI's floating GPT-5.6 alias"
env_key = "BANDICOT_OPENAI_TOKEN"
api_backend = "responses"
context_window = 362000
auto_compact_threshold_percent = 51
max_completion_tokens = 128000
agent_type = "codex"
reasoning_efforts = ["none", "low", "medium", "high", "xhigh", "max"]
supports_backend_search = false

