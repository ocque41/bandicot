# Secret-free OpenCode Go profile. Set OPENCODE_GO_API_KEY in the environment.
# OpenCode Go serves every subscription model through one OpenAI-compatible
# Chat Completions endpoint.

[cli]
auto_update = false

[models]
default = "go-kimi-k3"
web_search = "go-deepseek-v4-flash"
session_summary = "go-deepseek-v4-flash"
image_description = "go-kimi-k2.5"
prompt_suggestion = "go-deepseek-v4-flash"
allowed_models = ["go-*"]

[features]
telemetry = false
feedback = false
managed_config = false
remote_fetch = false
backend_tools = false
video_gen = false
voice_mode = false

[telemetry]
trace_upload = false
mixpanel_enabled = false
otel_enabled = false

[diagnostics]
error_reporting = false

[model.go-kimi-k3]
model = "kimi-k3"
base_url = "https://opencode.ai/zen/go/v1"
name = "OpenCode Go Kimi K3"
env_key = "OPENCODE_GO_API_KEY"
api_backend = "chat_completions"
auth_scheme = "bearer"
context_window = 1048576
auto_compact_threshold_percent = 92
max_completion_tokens = 131072
agent_type = "codex"
capabilities = { tools = true, image_input = true }
wire_quirks = { chat_max_tokens_field = "max_tokens", reasoning_response_field = "reasoning_content", send_stream_options = true, send_tool_choice = true }

