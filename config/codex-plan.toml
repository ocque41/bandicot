# Secret-free local profile for Grok Build through CLIProxyAPI and Codex OAuth.
#
# The launcher reads only CLIProxyAPI's loopback client token from the user's
# protected token file. Codex OAuth credentials remain owned by CLIProxyAPI.

[cli]
auto_update = false

[models]
default = "openai-sol"
default_reasoning_effort = "medium"
web_search = "openai-luna"
session_summary = "openai-luna"
image_description = "openai-luna"
prompt_suggestion = "openai-luna"
allowed_models = ["openai-*"]

[features]
telemetry = false
feedback = false
managed_config = false
remote_fetch = false
video_gen = false
voice_mode = false
backend_tools = false

[telemetry]
trace_upload = false
mixpanel_enabled = false
otel_enabled = false

[diagnostics]
error_reporting = false

[model.openai-latest]
model = "gpt-5.6-sol"
base_url = "http://127.0.0.1:8317/v1"
name = "GPT-5.6 Sol via Codex plan"
description = "Current frontier Codex-plan model through local CLIProxyAPI"
env_key = "GROK_CODEX_PROXY_TOKEN"
api_backend = "responses"
context_window = 372000
max_completion_tokens = 128000
agent_type = "codex"
reasoning_efforts = ["none", "low", "medium", "high", "xhigh", "max"]
supports_backend_search = false

