name: macOS Apple Silicon

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: macos-arm64-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validation:
    name: Validate (${{ matrix.group }})
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        group:
          - provider
          - shell
          - acceptance
          - pager

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_DEV_INCREMENTAL: "false"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_TEST_INCREMENTAL: "false"
      CARGO_TARGET_DIR: /tmp/bandicot-cargo-target

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install validation tools
        run: brew install dotslash ripgrep

      - name: Validate group
        shell: bash
        run: |
          set -euo pipefail
          export GROK_SHELL_BUNDLE_RG_PATH
          GROK_SHELL_BUNDLE_RG_PATH=$(command -v rg)
          case "${{ matrix.group }}" in
            provider)
              scripts/tests/run.sh
              scripts/tests/release-packaging.sh
              cargo fmt --all -- --check
              cargo check --locked \
                -p xai-grok-models \
                -p xai-grok-sampling-types \
                -p xai-grok-sampler
              cargo test --locked -p xai-grok-models
              cargo test --locked -p xai-grok-sampling-types
              cargo test --locked -p xai-grok-sampler --lib
              cargo test --locked -p xai-grok-sampler --test provider_wire
              ;;
            shell)
              cargo check --locked \
                -p xai-grok-shell \
                -p xai-grok-pager-bin
              cargo test --locked -p xai-grok-shell-base --test provider_boundary
              cargo test --locked -p xai-grok-shell \
                --test test_sampling_client \
                test_responses_api_streaming_text
              cargo test --locked -p xai-grok-shell \
                --test test_sampling_client \
                test_responses_api_streaming_tool_call
              cargo test --locked -p xai-grok-shell \
                --test test_sampling_client \
                test_responses_api_multi_turn_with_tool_calls
              ;;
            acceptance)
              cargo test --locked \
                -p xai-grok-shell \
                --test openai_distribution_acceptance
              ;;
            pager)
              cargo test --locked \
                -p xai-grok-pager \
                --test voice_auth_boundary
              ;;
          esac
          df -h .

  package:
    name: Build and package
    needs: validation
    runs-on: macos-15
    timeout-minutes: 120

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DIST_INCREMENTAL: "false"
      CARGO_PROFILE_RELEASE_DIST_DEBUG: "0"
      CARGO_PROFILE_RELEASE_DIST_STRIP: "symbols"
      CARGO_TARGET_DIR: /tmp/bandicot-cargo-target

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' crates/codegen/xai-grok-pager-bin/Cargo.toml | head -1)
          test -n "$version"
          if [[ "$GITHUB_REF_TYPE" == tag ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
          fi
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"

      - name: Install release tools
        run: brew install dotslash ripgrep

      - name: Build hardened Bandicot binary
        run: |
          rg_path=$(command -v rg)
          GROK_SHELL_BUNDLE_RG_PATH="$rg_path" cargo build --locked \
            -p xai-grok-pager-bin \
            --bin xai-grok-pager \
            --profile release-dist \
            --features release-dist
          "$CARGO_TARGET_DIR/release-dist/xai-grok-pager" --version

      - name: Build Apple Foundation Models helper
        run: scripts/build-apple-foundation-models.sh "$RUNNER_TEMP/bandicot-apple-foundation-models"

      - name: Package release
        id: package
        run: |
          mkdir -p "$RUNNER_TEMP/dist"
          archive=$(scripts/package-macos-release.sh \
            "${{ steps.version.outputs.version }}" \
            "$CARGO_TARGET_DIR/release-dist/xai-grok-pager" \
            "$RUNNER_TEMP/bandicot-apple-foundation-models" \
            "$RUNNER_TEMP/dist")
          scripts/render-homebrew-formula.sh \
            "${{ steps.version.outputs.version }}" \
            "$archive" \
            "$RUNNER_TEMP/dist/bandicot.rb"
          printf 'archive=%s\n' "$archive" >>"$GITHUB_OUTPUT"
          printf 'checksum=%s.sha256\n' "$archive" >>"$GITHUB_OUTPUT"

      - name: Upload short-lived development artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandicot-macos-arm64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
            ${{ runner.temp }}/dist/bandicot.rb
          retention-days: 1
          compression-level: 0

  built-binary-acceptance:
    name: Validate packaged binary
    needs: package
    runs-on: macos-15
    timeout-minutes: 90

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_TEST_INCREMENTAL: "false"
      CARGO_TARGET_DIR: /tmp/bandicot-cargo-target

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install validation tools
        run: brew install dotslash ripgrep

      - name: Download packaged binary
        uses: actions/download-artifact@v5
        with:
          name: bandicot-macos-arm64
          path: ${{ runner.temp }}/dist

      - name: Run authenticated local mock
        shell: bash
        run: |
          set -euo pipefail
          export GROK_SHELL_BUNDLE_RG_PATH
          GROK_SHELL_BUNDLE_RG_PATH=$(command -v rg)
          archive=$(find "$RUNNER_TEMP/dist" -name 'bandicot-*-aarch64-apple-darwin.tar.gz' -print -quit)
          test -n "$archive"
          tar -xzf "$archive" -C "$RUNNER_TEMP"
          binary=$(find "$RUNNER_TEMP" -path '*/libexec/bandicot/bandicot' -type f -print -quit)
          test -x "$binary"
          GROK_BINARY="$binary" cargo test --locked \
            -p xai-grok-shell \
            --test openai_distribution_acceptance \
            built_binary_uses_checked_in_openai_profile_end_to_end \
            -- \
            --ignored \
            --exact

  publish:
    name: Publish release and Homebrew formula
    if: github.ref_type == 'tag'
    needs:
      - package
      - built-binary-acceptance
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release files
        uses: actions/download-artifact@v5
        with:
          name: bandicot-macos-arm64
          path: ${{ runner.temp }}/dist

      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/dist/bandicot-*-aarch64-apple-darwin.tar.gz

      - name: Publish immutable release candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${GITHUB_REF_NAME#v}
          archive=$(find "$RUNNER_TEMP/dist" -name 'bandicot-*-aarch64-apple-darwin.tar.gz' -print -quit)
          checksum="$archive.sha256"
          formula="$RUNNER_TEMP/dist/bandicot.rb"
          test -f "$archive"
          test -f "$checksum"
          test -f "$formula"
          notes="$RUNNER_TEMP/release-notes.md"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
            capture && /^## \\[/ { exit }
            capture { print }
          ' CHANGELOG.md >"$notes"
          test -s "$notes"
          gh release create "v$version" \
            "$archive" \
            "$checksum" \
            "$formula" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$version" \
            --notes-file "$notes" \
            --verify-tag

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "$GH_TOKEN"
          version=${GITHUB_REF_NAME#v}
          formula="$RUNNER_TEMP/dist/bandicot.rb"
          encoded=$(base64 <"$formula" | tr -d '\n')
          current_sha=$(gh api \
            repos/ocque41/homebrew-tap/contents/Formula/bandicot.rb \
            --jq '.sha' 2>/dev/null || true)
          args=(
            --method PUT
            repos/ocque41/homebrew-tap/contents/Formula/bandicot.rb
            -f message="bandicot $version"
            -f content="$encoded"
          )
          if [[ -n "$current_sha" ]]; then
            args+=(-f sha="$current_sha")
          fi
          gh api "${args[@]}"
